<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard – Marcel Jurado</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --navy:#080821; --teal:#4fd1c5; --text:#ccd6f6; --muted:#8892b0; --white:#fff; --error:#ff6b6b; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--navy);z-index:100}
#appScreen{display:none}
.login-box{width:360px;padding:48px 40px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;text-align:center}
.logo{width:48px;height:48px;border-radius:50%;border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--teal);margin:0 auto 24px}
h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);margin-bottom:6px}
.sub{font-size:12px;color:var(--muted);margin-bottom:32px;letter-spacing:0.05em}
label{display:block;font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);text-align:left;margin-bottom:6px}
input[type=password]{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;outline:none;margin-bottom:16px}
.btn-login{width:100%;padding:13px;background:var(--teal);color:#080821;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer}
.err{color:var(--error);font-size:12px;margin-bottom:12px;display:none}

/* APP */
header{padding:20px 40px;border-bottom:1px solid rgba(79,209,197,0.1);display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,33,0.95)}
.h-logo{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--teal);font-weight:600}
.h-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--white);margin-left:12px}
.chip{background:rgba(79,209,197,0.08);border:1px solid rgba(79,209,197,0.2);border-radius:20px;padding:5px 14px;font-size:11px;color:var(--teal)}
.btn-out{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:7px 14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-left:12px}

.main{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 65px)}
.sidebar{border-right:1px solid rgba(255,255,255,0.06);overflow-y:auto}
.sidebar-hdr{padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,0.05)}
.sidebar-title{font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal)}
.client{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer}
.client:hover{background:rgba(255,255,255,0.03)}
.client.active{background:rgba(79,209,197,0.07);border-left:2px solid var(--teal)}
.client-name{font-size:14px;color:var(--white);margin-bottom:3px}
.client-date{font-size:11px;color:var(--muted)}
.client-goal{font-size:10px;background:rgba(79,209,197,0.1);color:var(--teal);padding:2px 8px;border-radius:10px;margin-left:8px}
.empty{padding:40px 24px;text-align:center;color:var(--muted);font-size:13px}

.detail{padding:32px 40px;overflow-y:auto}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:12px;min-height:400px;font-size:13px}

.d-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.d-name{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--white)}
.d-info{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.8}
.btn-pdf{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#080821;border:none;border-radius:4px;padding:12px 22px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer}

.sec{margin-bottom:24px}
.sec-title{font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--teal);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(79,209,197,0.15)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px}
.field{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.fv{font-size:13px;color:var(--white)}
.fv.empty{color:rgba(136,146,176,0.3);font-style:italic}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.tag{background:rgba(79,209,197,0.08);border:1px solid rgba(79,209,197,0.2);border-radius:10px;padding:3px 10px;font-size:11px;color:var(--teal)}
.alert{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.25);border-radius:4px;padding:12px 16px;font-size:12px;color:#ffaaaa;margin-bottom:16px}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="logo">MJ</div>
    <h1>Trainer Dashboard</h1>
    <p class="sub">Marcel Jurado Personal Training</p>
    <label>Passwort</label>
    <input type="password" id="pw" placeholder="••••••••">
    <div class="err" id="err">Falsches Passwort</div>
    <button class="btn-login" onclick="login()">Einloggen</button>
  </div>
</div>

<div id="appScreen">
  <header>
    <div style="display:flex;align-items:center">
      <div class="h-logo">MJ</div>
      <div class="h-title" style="margin-left:12px">Dashboard</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="chip" id="chip">0 Clients</div>
      <button class="btn-out" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-hdr"><div class="sidebar-title">Eingegangene Bögen</div></div>
      <div id="list"><div class="empty">Lade...</div></div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-empty"><p>Client aus der Liste wählen</p></div>
    </div>
  </div>
</div>

<script>
var SURL = 'https://llqftswzsvjhfolvpfqy.supabase.co';
var SKEY = 'sb_publishable_1PTHhbrNvSOmrHYn3bJHxg_CUfrITJH';
var PW   = 'MJ2024trainer';
var data = [];
var activeId = null;

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

function login() {
  if (document.getElementById('pw').value === PW) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    load();
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('pw').value = '';
  data = []; activeId = null;
}

function load() {
  document.getElementById('list').innerHTML = '<div class="empty">Lade...</div>';
  fetch(SURL + '/rest/v1/anamneseboegen?select=*&order=erstellt_am.desc', {
    headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(json) {
    data = Array.isArray(json) ? json : [];
    document.getElementById('chip').textContent = data.length + ' Client' + (data.length !== 1 ? 's' : '');
    renderList();
  })
  .catch(function(e) {
    document.getElementById('list').innerHTML = '<div class="empty">Fehler: ' + e.message + '</div>';
  });
}

function renderList() {
  var el = document.getElementById('list');
  if (!data.length) { el.innerHTML = '<div class="empty">Noch keine Einreichungen.</div>'; return; }
  el.innerHTML = data.map(function(c) {
    var d = c.erstellt_am ? new Date(c.erstellt_am).toLocaleDateString('de-DE') : '';
    return '<div class="client' + (c.id === activeId ? ' active' : '') + '" onclick="show(\'' + c.id + '\')">' +
      '<div class="client-name">' + (c.vorname||'') + ' ' + (c.nachname||'') + '</div>' +
      '<div style="display:flex;align-items:center"><span class="client-date">' + d + '</span>' +
      (c.hauptziel ? '<span class="client-goal">' + c.hauptziel + '</span>' : '') + '</div>' +
      '</div>';
  }).join('');
}

function f(label, value) {
  var v = (value !== null && value !== undefined && value !== '') ? value : null;
  return '<div class="field"><div class="fl">' + label + '</div><div class="fv' + (v ? '' : ' empty') + '">' + (v || '—') + '</div></div>';
}

function show(id) {
  activeId = id;
  renderList();
  var c = data.find(function(x) { return x.id === id; });
  if (!c) return;

  var parqRisk = c.parq_herz === 'ja' || c.parq_brust === 'ja' || c.parq_blutdruck === 'ja' || (c.parq_diabetes && c.parq_diabetes !== 'nein');
  var geb = c.geburtsdatum ? new Date(c.geburtsdatum).toLocaleDateString('de-DE') : '—';

  var html = '<div class="d-header">' +
    '<div><div class="d-name">' + (c.vorname||'') + ' ' + (c.nachname||'') + '</div>' +
    '<div class="d-info">' + (c.email||'') + (c.telefon ? ' · ' + c.telefon : '') + '</div></div>' +
    '<button class="btn-pdf" onclick="pdf(\'' + id + '\')">PDF</button></div>';

  if (parqRisk) html += '<div class="alert">⚠ PAR-Q+ Risikofaktoren — ärztliche Freigabe empfohlen</div>';

  html += '<div class="sec"><div class="sec-title">Persönliche Daten</div><div class="grid3">' +
    f('Geburtsdatum', geb) + f('Geschlecht', c.geschlecht) + f('Beruf', c.beruf) +
    f('Adresse', c.adresse) + f('PLZ / Ort', c.plz_ort) + '</div></div>';

  html += '<div class="sec"><div class="sec-title">Körper</div><div class="grid3">' +
    f('Größe', c.groesse ? c.groesse + ' cm' : null) +
    f('Gewicht', c.gewicht ? c.gewicht + ' kg' : null) +
    f('BMI', c.bmi) +
    f('Taille', c.taille ? c.taille + ' cm' : null) +
    f('Hüfte', c.huefte ? c.huefte + ' cm' : null) +
    f('Oberschenkel', c.oberschenkel ? c.oberschenkel + ' cm' : null) + '</div></div>';

  html += '<div class="sec"><div class="sec-title">Gesundheit</div><div class="grid3">' +
    f('Herzerkrankung', c.parq_herz) + f('Bluthochdruck', c.parq_blutdruck) +
    f('Diabetes', c.parq_diabetes) + f('Medikamente', c.parq_medikamente) +
    f('Blutdruck', c.blutdruck) + '</div>' +
    (c.risiken && c.risiken.length ? '<div style="margin-top:10px"><div class="fl" style="margin-bottom:5px">Risiken</div><div class="tags">' + c.risiken.map(function(r){return '<span class="tag">'+r+'</span>';}).join('') + '</div></div>' : '') +
    (c.verletzungen ? '<div style="margin-top:10px">' + f('Verletzungen', c.verletzungen) + '</div>' : '') + '</div>';

  html += '<div class="sec"><div class="sec-title">Lifestyle</div><div class="grid3">' +
    f('Schlaf', c.schlaf_stunden) + f('Schlafqualität', c.schlaf_qualitaet ? c.schlaf_qualitaet + '/10' : null) +
    f('Stress', c.stress_level ? c.stress_level + '/10' : null) +
    f('Energie', c.energie_level ? c.energie_level + '/10' : null) +
    f('Sitzen/Tag', c.sitz_stunden) + f('Schritte/Tag', c.schritte_tag) + '</div></div>';

  html += '<div class="sec"><div class="sec-title">Training</div><div class="grid3">' +
    f('Erfahrung', c.training_jahre) + f('Frequenz/Wo', c.training_frequenz) +
    f('Liegestütze', c.liegestuetze_max) +
    f('Plank Hold', c.plank_hold_sek ? c.plank_hold_sek + ' sek' : null) +
    f('Wall-Sit', c.wall_sit_sek ? c.wall_sit_sek + ' sek' : null) +
    f('1km Laufzeit', c.km_laufzeit) + '</div>' +
    (c.sportarten && c.sportarten.length ? '<div style="margin-top:10px"><div class="fl" style="margin-bottom:5px">Sportarten</div><div class="tags">' + c.sportarten.map(function(s){return '<span class="tag">'+s+'</span>';}).join('') + '</div></div>' : '') + '</div>';

  html += '<div class="sec"><div class="sec-title">Ernährung</div><div class="grid3">' +
    f('Mahlzeiten/Tag', c.mahlzeiten_tag) + f('Wasser', c.wasser_konsum) +
    f('Alkohol', c.alkohol) + f('Koffein', c.koffein) +
    f('Supplements', c.supplements) + f('Unverträglichkeiten', c.unvertraeglichkeiten) + '</div></div>';

  html += '<div class="sec"><div class="sec-title">Longevity Baseline</div><div class="grid3">' +
    f('VO₂max', c.vo2max ? c.vo2max + ' ml/kg/min' : null) +
    f('Grip rechts', c.grip_rechts ? c.grip_rechts + ' kg' : null) +
    f('Grip links', c.grip_links ? c.grip_links + ' kg' : null) +
    f('Balance rechts', c.balance_rechts ? c.balance_rechts + ' sek' : null) +
    f('Balance links', c.balance_links ? c.balance_links + ' sek' : null) +
    f('Chair Stand', c.chair_stand) + '</div>' +
    '<div class="grid2" style="margin-top:14px">' +
    '<div style="background:rgba(79,209,197,0.04);border:1px solid rgba(79,209,197,0.15);border-radius:4px;padding:14px"><div class="fl" style="margin-bottom:8px">J&P – Frau</div><div class="grid3">' +
    f('Trizeps', c.jp_f_trizeps ? c.jp_f_trizeps + ' mm' : null) +
    f('Hüfte', c.jp_f_huefte ? c.jp_f_huefte + ' mm' : null) +
    f('Oberschenkel', c.jp_f_oberschenkel ? c.jp_f_oberschenkel + ' mm' : null) + '</div>' +
    '<div style="font-family:Cormorant Garamond,serif;font-size:28px;color:var(--teal);margin-top:8px">' + (c.jp_f_ergebnis ? c.jp_f_ergebnis + ' %' : '—') + '</div></div>' +
    '<div style="background:rgba(79,209,197,0.04);border:1px solid rgba(79,209,197,0.15);border-radius:4px;padding:14px"><div class="fl" style="margin-bottom:8px">J&P – Mann</div><div class="grid3">' +
    f('Brust', c.jp_m_brust ? c.jp_m_brust + ' mm' : null) +
    f('Abdomen', c.jp_m_abdomen ? c.jp_m_abdomen + ' mm' : null) +
    f('Oberschenkel', c.jp_m_oberschenkel ? c.jp_m_oberschenkel + ' mm' : null) + '</div>' +
    '<div style="font-family:Cormorant Garamond,serif;font-size:28px;color:var(--teal);margin-top:8px">' + (c.jp_m_ergebnis ? c.jp_m_ergebnis + ' %' : '—') + '</div></div>' +
    '</div></div>';

  html += '<div class="sec"><div class="sec-title">Ziele</div><div class="grid2">' +
    f('Hauptziel', c.hauptziel) + f('Zeitbudget/Wo', c.zeitbudget) + '</div>' +
    (c.ziel_3monate ? '<div style="margin-top:10px">' + f('Ziel in 3 Monaten', c.ziel_3monate) + '</div>' : '') +
    (c.anmerkungen ? '<div style="margin-top:10px">' + f('Anmerkungen', c.anmerkungen) + '</div>' : '') + '</div>';

  document.getElementById('detail').innerHTML = html;
}

function pdf(id) {
  var c = data.find(function(x) { return x.id === id; });
  if (!c) return;
  var datum = new Date().toLocaleDateString('de-DE');

  function fRow(label, value) {
    var v = (value !== null && value !== undefined && value !== '') ? value : '—';
    return '<tr><td style="font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:#888;padding:4px 8px 4px 0;width:35%">' + label + '</td><td style="font-size:11px;color:#1a1a2e;padding:4px 0;border-bottom:1px solid #f0f0f0">' + v + '</td></tr>';
  }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Anamnesebogen ' + (c.vorname||'') + ' ' + (c.nachname||'') + '</title>' +
    '<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;color:#1a1a2e;padding:14mm 16mm;max-width:210mm}' +
    'h2{font-size:9px;font-weight:bold;letter-spacing:0.2em;text-transform:uppercase;color:#4fd1c5;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #e8e8e8}' +
    'table{width:100%;border-collapse:collapse}.hdr{display:flex;justify-content:space-between;border-bottom:2px solid #080821;padding-bottom:10px;margin-bottom:16px}' +
    '.hdr h1{font-size:20px;font-weight:normal;color:#080821}.hdr p{font-size:10px;color:#666;margin-top:2px;text-transform:uppercase;letter-spacing:0.08em}' +
    '.hdr-r{text-align:right;font-size:11px;color:#666;line-height:1.8}.hdr-r strong{color:#080821;font-size:13px}' +
    '.tags{display:flex;flex-wrap:wrap;gap:3px}.tag{background:#f0fffe;border:1px solid #4fd1c5;border-radius:3px;padding:1px 6px;font-size:9px}' +
    '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>' +
    '<div class="hdr"><div><h1>Anamnesebogen</h1><p>Marcel Jurado Personal Training</p></div>' +
    '<div class="hdr-r"><strong>' + (c.vorname||'') + ' ' + (c.nachname||'') + '</strong><br>' + (c.email||'') + (c.telefon?'<br>'+c.telefon:'') + '<br>Datum: ' + datum + '</div></div>' +

    '<h2>Persönliche Daten</h2><table>' +
    fRow('Geburtsdatum', c.geburtsdatum ? new Date(c.geburtsdatum).toLocaleDateString('de-DE') : null) +
    fRow('Geschlecht', c.geschlecht) + fRow('Beruf', c.beruf) + fRow('Adresse', c.adresse) + fRow('PLZ / Ort', c.plz_ort) + '</table>' +

    '<h2>Körpermessungen</h2><table>' +
    fRow('Größe', c.groesse ? c.groesse + ' cm' : null) + fRow('Gewicht', c.gewicht ? c.gewicht + ' kg' : null) + fRow('BMI', c.bmi) +
    fRow('Taille', c.taille ? c.taille + ' cm' : null) + fRow('Hüfte', c.huefte ? c.huefte + ' cm' : null) + '</table>' +

    '<h2>Gesundheit & PAR-Q+</h2><table>' +
    fRow('Herzerkrankung', c.parq_herz) + fRow('Bluthochdruck', c.parq_blutdruck) +
    fRow('Diabetes', c.parq_diabetes) + fRow('Medikamente', c.parq_medikamente) +
    fRow('Blutdruck', c.blutdruck) + fRow('Verletzungen', c.verletzungen) + fRow('OPs', c.ops) + '</table>' +
    (c.risiken && c.risiken.length ? '<div style="margin-top:8px"><div style="font-size:9px;text-transform:uppercase;color:#888;margin-bottom:4px">Risiken</div><div class="tags">' + c.risiken.map(function(r){return '<span class="tag">'+r+'</span>';}).join('') + '</div></div>' : '') +

    '<h2>Lifestyle</h2><table>' +
    fRow('Schlaf', c.schlaf_stunden) + fRow('Schlafqualität', c.schlaf_qualitaet ? c.schlaf_qualitaet + '/10' : null) +
    fRow('Stress', c.stress_level ? c.stress_level + '/10' : null) + fRow('Energie', c.energie_level ? c.energie_level + '/10' : null) +
    fRow('Sitzen/Tag', c.sitz_stunden) + '</table>' +

    '<h2>Training</h2><table>' +
    fRow('Erfahrung', c.training_jahre) + fRow('Frequenz/Wo', c.training_frequenz) +
    fRow('Liegestütze', c.liegestuetze_max) + fRow('Plank Hold', c.plank_hold_sek ? c.plank_hold_sek + ' sek' : null) +
    fRow('1km Laufzeit', c.km_laufzeit) + '</table>' +
    (c.sportarten && c.sportarten.length ? '<div style="margin-top:8px"><div class="tags">' + c.sportarten.map(function(s){return '<span class="tag">'+s+'</span>';}).join('') + '</div></div>' : '') +

    '<h2>Ernährung</h2><table>' +
    fRow('Mahlzeiten/Tag', c.mahlzeiten_tag) + fRow('Wasser', c.wasser_konsum) +
    fRow('Alkohol', c.alkohol) + fRow('Supplements', c.supplements) + fRow('Unverträglichkeiten', c.unvertraeglichkeiten) + '</table>' +

    '<h2>Longevity Baseline</h2><table>' +
    fRow('VO₂max', c.vo2max ? c.vo2max + ' ml/kg/min' : null) +
    fRow('Grip rechts', c.grip_rechts ? c.grip_rechts + ' kg' : null) +
    fRow('Grip links', c.grip_links ? c.grip_links + ' kg' : null) +
    fRow('Balance rechts', c.balance_rechts ? c.balance_rechts + ' sek' : null) +
    fRow('Chair Stand', c.chair_stand) + '</table>' +
    '<table style="margin-top:8px">' +
    fRow('J&P Frau – Ergebnis', c.jp_f_ergebnis ? c.jp_f_ergebnis + ' %' : null) +

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer Dashboard – Marcel Jurado</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #080821;
  --navy2: #0d1535;
  --navy3: #1a2550;
  --teal:  #4fd1c5;
  --teal2: #38b2ac;
  --cream: #faf8f5;
  --text:  #ccd6f6;
  --muted: #8892b0;
  --white: #ffffff;
  --error: #ff6b6b;
  --green: #68d391;
  --r: 4px;
  --t: 0.22s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--navy);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

body::before {
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%, rgba(79,209,197,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(79,209,197,0.04) 0%, transparent 50%);
}

/* ── LOGIN ── */
.login-wrap {
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;
  background:var(--navy);
}
.login-box {
  width:100%;max-width:380px;padding:48px 40px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;
  position:relative;z-index:1;
}
.login-logo {
  width:48px;height:48px;border-radius:50%;border:1.5px solid var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;
  color:var(--teal);margin:0 auto 24px;
}
.login-title {
  font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;
  color:var(--white);text-align:center;margin-bottom:6px;
}
.login-sub { font-size:12px;color:var(--muted);text-align:center;margin-bottom:32px;letter-spacing:0.05em; }
.login-field { display:flex;flex-direction:column;gap:6px;margin-bottom:20px; }
.login-field label { font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted); }
.login-field input {
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r);color:var(--white);font-family:'DM Sans',sans-serif;
  font-size:14px;padding:12px 16px;outline:none;transition:all var(--t);
}
.login-field input:focus { border-color:rgba(79,209,197,0.5);background:rgba(79,209,197,0.04); }
.login-err { font-size:11px;color:var(--error);margin-top:-12px;margin-bottom:8px;display:none; }
.btn-login {
  width:100%;padding:13px;background:var(--teal);color:var(--navy);
  border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;transition:all var(--t);
}
.btn-login:hover { background:#5de0d4;box-shadow:0 4px 20px rgba(79,209,197,0.35); }

/* ── APP SHELL ── */
.app { display:none;min-height:100vh;position:relative;z-index:1; }
.app.visible { display:block; }

header {
  padding:20px 40px;border-bottom:1px solid rgba(79,209,197,0.1);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(8,8,33,0.95);
  backdrop-filter:blur(12px);z-index:50;
}
.header-left { display:flex;align-items:center;gap:14px; }
.h-logo {
  width:36px;height:36px;border-radius:50%;border:1.5px solid var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--teal);font-weight:600;
}
.h-title { font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:var(--white); }
.h-title span { display:block;font-size:10px;font-weight:300;color:var(--muted);letter-spacing:0.15em;font-family:'DM Sans',sans-serif; }
.header-right { display:flex;align-items:center;gap:16px; }
.stat-chip {
  background:rgba(79,209,197,0.08);border:1px solid rgba(79,209,197,0.2);
  border-radius:20px;padding:5px 14px;font-size:11px;color:var(--teal);
  letter-spacing:0.08em;
}
.btn-logout {
  background:transparent;border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r);padding:7px 14px;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all var(--t);
}
.btn-logout:hover { border-color:rgba(255,255,255,0.25);color:var(--text); }

/* ── MAIN LAYOUT ── */
.main { display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 65px); }

/* ── CLIENT LIST ── */
.sidebar {
  border-right:1px solid rgba(255,255,255,0.06);
  overflow-y:auto;max-height:calc(100vh - 65px);
  position:sticky;top:65px;
}
.sidebar-header {
  padding:20px 24px 16px;border-bottom:1px solid rgba(255,255,255,0.05);
  position:sticky;top:0;background:var(--navy);z-index:10;
}
.sidebar-title { font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--teal); }
.search-wrap { margin-top:12px;position:relative; }
.search-wrap input {
  width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:13px;padding:9px 14px 9px 36px;outline:none;transition:all var(--t);
}
.search-wrap input:focus { border-color:rgba(79,209,197,0.4); }
.search-wrap svg { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted); }

.client-item {
  padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;transition:background var(--t);
}
.client-item:hover { background:rgba(255,255,255,0.03); }
.client-item.active { background:rgba(79,209,197,0.07);border-left:2px solid var(--teal); }
.client-name { font-size:14px;font-weight:400;color:var(--white);margin-bottom:3px; }
.client-meta { display:flex;gap:10px;align-items:center; }
.client-date { font-size:11px;color:var(--muted); }
.client-goal {
  font-size:10px;background:rgba(79,209,197,0.1);color:var(--teal);
  padding:2px 8px;border-radius:10px;letter-spacing:0.06em;
}
.empty-list { padding:40px 24px;text-align:center;color:var(--muted);font-size:13px; }

/* ── DETAIL PANEL ── */
.detail { padding:32px 40px;overflow-y:auto;max-height:calc(100vh - 65px); }
.detail-empty {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--muted);gap:12px;min-height:400px;
}
.detail-empty svg { opacity:0.2; }
.detail-empty p { font-size:13px;letter-spacing:0.05em; }

.detail-header {
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.07);
}
.detail-name { font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--white); }
.detail-info { font-size:12px;color:var(--muted);margin-top:4px;line-height:1.8; }
.btn-pdf {
  display:inline-flex;align-items:center;gap:8px;
  background:var(--teal);color:var(--navy);border:none;border-radius:var(--r);
  padding:12px 22px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all var(--t);
  white-space:nowrap;
}
.btn-pdf:hover { background:#5de0d4;box-shadow:0 4px 16px rgba(79,209,197,0.35);transform:translateY(-1px); }

/* ── SECTIONS ── */
.d-section { margin-bottom:28px; }
.d-section-title {
  font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--teal);margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid rgba(79,209,197,0.15);
}
.d-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:14px 20px; }
.d-grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:14px 20px; }
.d-field { display:flex;flex-direction:column;gap:4px; }
.d-label { font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted); }
.d-value { font-size:13px;color:var(--white); }
.d-value.empty { color:rgba(136,146,176,0.3);font-style:italic; }
.d-full { grid-column:1/-1; }

.tags { display:flex;flex-wrap:wrap;gap:6px;margin-top:2px; }
.tag {
  background:rgba(79,209,197,0.08);border:1px solid rgba(79,209,197,0.2);
  border-radius:10px;padding:3px 10px;font-size:11px;color:var(--teal);
}
.tag.red { background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.25);color:#ff9a9a; }

.scale-row { display:flex;align-items:center;gap:10px; }
.scale-track { flex:1;height:3px;background:rgba(255,255,255,0.08);border-radius:2px; }
.scale-fill  { height:100%;background:var(--teal);border-radius:2px;transition:width 0.5s ease; }
.scale-num   { font-size:13px;font-weight:500;color:var(--teal);min-width:24px;text-align:right; }

.parq-alert {
  background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.25);
  border-radius:var(--r);padding:12px 16px;font-size:12px;color:#ffaaaa;
  margin-bottom:16px;
}

.jp-cols { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
.jp-box {
  background:rgba(79,209,197,0.04);border:1px solid rgba(79,209,197,0.15);
  border-radius:var(--r);padding:16px;
}
.jp-box-title { font-size:10px;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--teal);margin-bottom:12px; }
.jp-result {
  font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;
  color:var(--teal);margin-top:10px;
}

/* ── LOADING ── */
.loading { padding:60px;text-align:center;color:var(--muted); }
.spinner-lg {
  width:28px;height:28px;border:2px solid rgba(79,209,197,0.2);
  border-top-color:var(--teal);border-radius:50%;
  animation:spin 0.7s linear infinite;margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }

@media(max-width:900px){
  .main { grid-template-columns:1fr; }
  .sidebar { max-height:300px;position:relative;top:0; }
  .detail { padding:24px 20px; }
  header { padding:16px 20px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">MJ</div>
    <h2 class="login-title">Trainer Dashboard</h2>
    <p class="login-sub">Marcel Jurado Personal Training</p>
    <div class="login-field">
      <label>Passwort</label>
      <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="loginErr">Falsches Passwort</div>
    <button class="btn-login" onclick="doLogin()">Einloggen</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <header>
    <div class="header-left">
      <div class="h-logo">MJ</div>
      <div class="h-title">
        Dashboard
        <span>Marcel Jurado Personal Training</span>
      </div>
    </div>
    <div class="header-right">
      <div class="stat-chip" id="statChip">0 Clients</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Eingegangene Bögen</div>
        <div class="search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Name suchen…" oninput="filterClients()">
        </div>
      </div>
      <div id="clientList"><div class="loading"><div class="spinner-lg"></div>Lade Daten…</div></div>
    </div>

    <!-- DETAIL -->
    <div class="detail" id="detailPanel">
      <div class="detail-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <p>Client aus der Liste wählen</p>
      </div>
    </div>

  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://llqftswzsvjhfolvpfqy.supabase.co'; // ← anpassen
const SUPABASE_KEY = 'sb_publishable_1PTHhbrNvSOmrHYn3bJHxg_CUfrlTJH';                 // ← anpassen
const TABLE       = 'anamneseboegen';
const DASHBOARD_PW = 'MJ2024trainer';                        // ← Passwort ändern!

// ── STATE ─────────────────────────────────────────────────────────────
let allClients = [];
let activeId   = null;

// ── LOGIN ─────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === DASHBOARD_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadClients();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

function logout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('pwInput').value = '';
  allClients = []; activeId = null;
}

// ── LOAD DATA ─────────────────────────────────────────────────────────
async function loadClients() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=erstellt_am.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    allClients = await res.json();
    document.getElementById('statChip').textContent = `${allClients.length} Client${allClients.length !== 1 ? 's' : ''}`;
    renderList(allClients);
  } catch(e) {
    document.getElementById('clientList').innerHTML = '<div class="empty-list">Fehler beim Laden der Daten.</div>';
  }
}

// ── RENDER LIST ───────────────────────────────────────────────────────
function renderList(clients) {
  const el = document.getElementById('clientList');
  if (!clients.length) {
    el.innerHTML = '<div class="empty-list">Noch keine Einreichungen.</div>';
    return;
  }
  el.innerHTML = clients.map(c => `
    <div class="client-item ${c.id === activeId ? 'active' : ''}" onclick="showClient('${c.id}')">
      <div class="client-name">${c.vorname || ''} ${c.nachname || ''}</div>
      <div class="client-meta">
        <span class="client-date">${fmtDate(c.erstellt_am)}</span>
        ${c.hauptziel ? `<span class="client-goal">${c.hauptziel}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderList(allClients.filter(c =>
    `${c.vorname} ${c.nachname}`.toLowerCase().includes(q)
  ));
}

// ── SHOW CLIENT ───────────────────────────────────────────────────────
function showClient(id) {
  activeId = id;
  renderList(document.getElementById('searchInput').value ?
    allClients.filter(c => `${c.vorname} ${c.nachname}`.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase())) :
    allClients
  );
  const d = allClients.find(c => c.id === id);
  if (!d) return;

  const parqRisk = ['parq_herz','parq_brust','parq_blutdruck'].some(k => d[k] === 'ja') ||
    (d.parq_diabetes && d.parq_diabetes !== 'nein');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${d.vorname || ''} ${d.nachname || ''}</div>
        <div class="detail-info">
          ${d.email || ''}${d.telefon ? ' · ' + d.telefon : ''}<br>
          Eingegangen: ${fmtDate(d.erstellt_am)} · Beruf: ${d.beruf || '—'}
        </div>
      </div>
      <button class="btn-pdf" onclick="generatePDF('${id}')">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        PDF
      </button>
    </div>

    ${parqRisk ? `<div class="parq-alert">⚠ PAR-Q+ Risikofaktoren vorhanden — ärztliche Freigabe empfohlen</div>` : ''}

    <div class="d-section">
      <div class="d-section-title">Körper</div>
      <div class="d-grid">
        ${dField('Größe', d.groesse ? d.groesse + ' cm' : null)}
        ${dField('Gewicht', d.gewicht ? d.gewicht + ' kg' : null)}
        ${dField('BMI', d.bmi)}
        ${dField('Geburtsdatum', d.geburtsdatum ? fmtDateShort(d.geburtsdatum) : null)}
        ${dField('Geschlecht', d.geschlecht)}
        ${dField('Adresse', d.plz_ort)}
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Gesundheit & PAR-Q+</div>
      <div class="d-grid">
        ${dField('Herzerkrankung', d.parq_herz, d.parq_herz==='ja')}
        ${dField('Brustschmerzen', d.parq_brust, d.parq_brust==='ja')}
        ${dField('Bluthochdruck', d.parq_blutdruck, d.parq_blutdruck==='ja')}
        ${dField('Diabetes', d.parq_diabetes, d.parq_diabetes && d.parq_diabetes!=='nein')}
        ${dField('Medikamente', d.parq_medikamente, d.parq_medikamente==='ja')}
        ${dField('Blutdruck', d.blutdruck)}
      </div>
      ${d.medikamente_list ? `<div class="d-field" style="margin-top:12px"><div class="d-label">Medikamentenliste</div><div class="d-value">${d.medikamente_list}</div></div>` : ''}
      ${d.risiken && d.risiken.length ? `<div style="margin-top:12px"><div class="d-label" style="margin-bottom:6px">Risikofaktoren</div><div class="tags">${d.risiken.map(r=>`<span class="tag red">${r}</span>`).join('')}</div></div>` : ''}
      ${d.verletzungen ? `<div class="d-field" style="margin-top:12px"><div class="d-label">Verletzungen</div><div class="d-value">${d.verletzungen}</div></div>` : ''}
      ${d.ops ? `<div class="d-field" style="margin-top:8px"><div class="d-label">OPs</div><div class="d-value">${d.ops}</div></div>` : ''}
    </div>

    ${d.hat_schmerzen === 'ja' ? `
    <div class="d-section">
      <div class="d-section-title">Schmerzen (NRS 0–10)</div>
      <div class="d-grid">
        ${scaleField('Nacken / HWS', d.schmerz_nacken)}
        ${scaleField('Schulter', d.schmerz_schulter)}
        ${scaleField('Rücken / LWS', d.schmerz_lws)}
        ${scaleField('Hüfte / ISG', d.schmerz_huefte)}
        ${scaleField('Knie', d.schmerz_knie)}
        ${scaleField('Sprunggelenk', d.schmerz_sprunggelenk)}
      </div>
      <div class="d-grid-2" style="margin-top:12px">
        ${dField('Dauer', d.schmerz_dauer)}
        ${dField('Wann', Array.isArray(d.schmerz_wann) ? d.schmerz_wann.join(', ') : d.schmerz_wann)}
        ${dField('Lindert', d.schmerz_lindert)}
        ${dField('Verschlechtert', d.schmerz_verschlechtert)}
      </div>
      ${d.physio_vorher ? `<div class="d-field" style="margin-top:12px"><div class="d-label">Frühere Physio</div><div class="d-value">${d.physio_vorher}</div></div>` : ''}
    </div>` : ''}

    <div class="d-section">
      <div class="d-section-title">Lifestyle</div>
      <div class="d-grid">
        ${dField('Schlaf', d.schlaf_stunden)}
        ${scaleField('Schlafqualität', d.schlaf_qualitaet)}
        ${scaleField('Stress', d.stress_level)}
        ${scaleField('Energie', d.energie_level)}
        ${dField('Sitzen / Tag', d.sitz_stunden)}
        ${dField('Schritte / Tag', d.schritte_tag)}
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Training</div>
      <div class="d-grid">
        ${dField('Erfahrung', d.training_jahre)}
        ${dField('Frequenz / Wo', d.training_frequenz)}
        ${dField('Liegestütze', d.liegestuetze_max)}
        ${dField('Plank Hold', d.plank_hold_sek ? d.plank_hold_sek + ' sek' : null)}
        ${dField('Wall-Sit', d.wall_sit_sek ? d.wall_sit_sek + ' sek' : null)}
        ${dField('1km Laufzeit', d.km_laufzeit)}
      </div>

// ── HELPER RENDERERS ──────────────────────────────────────────────────
function dField(label, value, isAlert = false) {
  const v = (value !== null && value !== undefined && value !== '') ? value : null;
  return `<div class="d-field">
    <div class="d-label">${label}</div>
    <div class="d-value${v ? (isAlert ? ' red' : '') : ' empty'}" style="${isAlert && v ? 'color:var(--error)' : ''}">${v || '—'}</div>
  </div>`;
}

function scaleField(label, value) {
  const v = (value !== null && value !== undefined) ? parseInt(value) : null;
  const pct = v !== null ? (v / 10 * 100) : 0;
  return `<div class="d-field">
    <div class="d-label">${label}</div>
    <div class="scale-row">
      <div class="scale-track"><div class="scale-fill" style="width:${pct}%"></div></div>
      <div class="scale-num">${v !== null ? v : '—'}</div>
    </div>
  </div>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
}
